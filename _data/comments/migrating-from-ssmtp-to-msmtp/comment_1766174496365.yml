message: >-
  Thanks for posting this! One thing you can do to simplify this configuration
  is to create a symbolic link /usr/sbin/sendmail -> /usr/bin/msmtp -- if you do
  that, you can skip the /usr/local/etc/php/conf.d/mail.ini configuration
  entirely, since PHP will use /usr/sbin/sendmail by default, and msmtp's
  command-line interface is identical to sendmail's.
