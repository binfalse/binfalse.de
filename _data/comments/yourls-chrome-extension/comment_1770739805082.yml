message: >-
  I cannot believe anything we concern ourselves with in our lives matters. At
  all times spent thinking about the several things that people confront every
  single working day is going to be undoubtedly necessary, as no other man will
  probably encounter life for us. I feel that folk need to be even more sane.
  Research is delightful, but so much of what we should think about is so
  abstract. Having a cup of coffee is a zen activity that takes one back again
  to the present point in time. We need to be more in the here and now, without
  being overcome by life and the drama we confront every day.
