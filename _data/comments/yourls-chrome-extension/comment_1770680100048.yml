message: >-
  Upon reflection, I felt like  your post was timely and relevant.   Thank you
  very much for creating this article; if more writers wrote intelligent and
  time-worthy prose, I think we'd all be in a better situation. I, personally,
  think we should place our attention more on staying fit and eating well and
  escape from being always on the computer or cell phone screen.  Going outside
  (and not being glued to the cell phone all the while, either) and living life
  in full appreciation of the randomness and patterns of nature, keeps people
  feeling sane and feeling joyous.  Considering important topics is likewise an
  experience that can aid us make the discovery of self understanding.
