message: >-
  I can't believe that anything we get side tracked about in our lives matters.
  On a regular basis squandered taking into consideration the various things
  that we face every day can be really important, as no other man is going to
  face life for us. Personally I think that folk need to be even more mentally
  stable. Science is great, nevertheless a lot of what we should think about is
  indeed abstract. Having a cup of coffee is a zen activity that brings one back
  again to the present moment in time. We need to become more in the here and
  today, without being confused by life and the theatre we face each day.
