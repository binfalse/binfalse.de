message: >-
  I just can't imagine everything we concern ourselves with in our lives
  matters. Continuously put in taking into consideration the several things that
  we encounter every single working day is definitely really important, as no
  other person is going to encounter existence for us. Personally I think that
  people young and old need to be even more sane. Research is wonderful, but a
  lot of anything you think about is indeed abstract. Having a cup of kava is a
  zen activity that takes one back to the present second. We must be more in the
  here and now, without being overwhelmed by existence and the drama we
  encounter each day.
