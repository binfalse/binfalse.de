message: >-
  I can't consider all the things we get side tracked about in our lives makes a
  difference. Continuously spent thinking about the numerous things that people
  deal with every single moment is going to be undoubtedly necessary, as no
  other man will deal with your life for us. I feel that folk need to be even
  more grounded. Research is amazing, nevertheless a lot of that which we think
  about is indeed abstract. Having a cup of kava is a zen process that brings
  one back to the present second. We have to become more in the here and today,
  without being overcome by existence and the dilemmas we confront every day.
